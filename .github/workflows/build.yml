name: Build Expo iOS

on:
  push:
    branches:
      - main  # Trigger build on pushing to the main branch
  pull_request:
    branches:
      - main  # Trigger build on pull requests to the main branch

jobs:
  build:
    runs-on: macos-latest  # Run on macOS (necessary for iOS builds)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Specify the Node.js version (adjust as necessary)

      - name: Install dependencies
        run: |
          npm install

      - name: Install Expo CLI
        run: |
          npm install -g expo-cli

      - name: Build the app for iOS
        run: |
          expo build:ios --non-interactive --no-publish
          
      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v2
        with:
          name: expo-ipa
          path: ./build/ios/*.ipa  # Path to the built .ipa file
